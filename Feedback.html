<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Обратная связь - CodeStart Navigator</title>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
color: white;
line-height: 1.6;
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
}

.container {
max-width: 600px;
width: 90%;
margin: 0 auto;
}

.form-block {
background: rgba(255, 255, 255, 0.1);
backdrop-filter: blur(10px);
border-radius: 20px;
padding: 40px;
box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
border: 1px solid rgba(255, 255, 255, 0.2);
}

h1 {
font-size: 2.5em;
margin-bottom: 20px;
background: linear-gradient(135deg, #fff, #e0e0e0);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
text-align: center;
}

h2 {
color: #ffd700;
margin-bottom: 30px;
text-align: center;
}

p {
text-align: center;
margin-bottom: 30px;
opacity: 0.9;
}

.form-group {
margin-bottom: 25px;
}

label {
display: block;
margin-bottom: 8px;
color: #ffd700;
font-weight: 500;
}

input, textarea {
width: 100%;
padding: 15px;
border-radius: 10px;
border: none;
background: rgba(255, 255, 255, 0.1);
color: white;
font-size: 1em;
transition: all 0.3s;
}

input:focus, textarea:focus {
outline: none;
background: rgba(255, 255, 255, 0.2);
box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
}

.btn {
display: inline-block;
padding: 15px 40px;
font-size: 1.2em;
border: none;
border-radius: 50px;
background: linear-gradient(135deg, #ffd700, #ffa500);
color: white;
cursor: pointer;
transition: transform 0.3s, box-shadow 0.3s;
width: 100%;
margin-top: 20px;
}

.btn:hover {
transform: translateY(-3px);
box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
}

.btn-secondary {
background: rgba(255, 255, 255, 0.2);
margin-top: 15px;
text-decoration: none;
display: inline-block;
text-align: center;
}

.message {
margin-top: 20px;
padding: 15px;
border-radius: 10px;
text-align: center;
display: none;
}

.success {
background: rgba(0, 255, 0, 0.2);
border: 1px solid #00ff00;
}

.button-group {
display: flex;
gap: 15px;
margin-top: 20px;
}

.button-group .btn {
margin-top: 0;
}

@media (max-width: 768px) {
.form-block { padding: 25px; }
h1 { font-size: 2em; }
.button-group { flex-direction: column; }
}
</style>
</head>
<body>
<div class="container">
<div class="form-block">
<h1>📬 CodeStart Navigator</h1>
<h2>Обратная связь</h2>
<p>Есть вопросы, предложения или замечания? Напиши нам! Мы обязательно ответим.</p>

<form action="https://formspree.io/f/xjgaeayr" method="POST">
<div class="form-group">
<label for="name">👤 Ваше имя</label>
<input type="text" id="name" name="name" placeholder="Например: Анна" required>
</div>

<div class="form-group">
<label for="email">📧 Ваш Email</label>
<input type="email" id="email" name="email" placeholder="example@mail.ru" required>
</div>

<div class="form-group">
<label for="message">💬 Сообщение</label>
<textarea id="message" name="message" rows="5" placeholder="Напишите, что вас интересует..." required></textarea>
</div>

<button type="submit" class="btn">✉️ Отправить сообщение</button>
</form>

<div id="formMessage" class="message"></div>

<div class="button-group">
<a href="index.html" class="btn btn-secondary">🏠 На главную</a>
<button class="btn btn-secondary" onclick="clearForm()">🔄 Очистить</button>
</div>
</div>
</div>
</body>
</html>
